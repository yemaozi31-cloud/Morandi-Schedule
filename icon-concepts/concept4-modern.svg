<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- 渐变背景 squircle -->
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B5C7B2"/>
      <stop offset="100%" stop-color="#8A9E87"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAF7F2"/>
      <stop offset="100%" stop-color="#F0EBE4"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="220" fill="url(#bgGrad)"/>

  <!-- 日历卡片 - 两层叠加效果 -->
  <rect x="200" y="300" width="624" height="500" rx="40" fill="url(#cardGrad)" opacity="0.85"/>
  <rect x="240" y="260" width="624" height="500" rx="40" fill="#FAF7F2"/>

  <!-- 日历头 -->
  <rect x="240" y="260" width="624" height="100" rx="40" fill="#A3B5A0"/>
  <rect x="240" y="300" width="624" height="60" fill="#A3B5A0"/>

  <!-- 星期简写 -->
  <text x="410" y="325" font-family="'Helvetica Neue', system-ui, sans-serif" font-size="28" font-weight="500" fill="#FAF7F2" text-anchor="middle" opacity="0.7">M</text>
  <text x="500" y="325" font-family="'Helvetica Neue', system-ui, sans-serif" font-size="28" font-weight="500" fill="#FAF7F2" text-anchor="middle" opacity="0.7">T</text>
  <text x="590" y="325" font-family="'Helvetica Neue', system-ui, sans-serif" font-size="28" font-weight="500" fill="#FAF7F2" text-anchor="middle" opacity="0.7">W</text>
  <text x="680" y="325" font-family="'Helvetica Neue', system-ui, sans-serif" font-size="28" font-weight="500" fill="#FAF7F2" text-anchor="middle" opacity="0.7">T</text>
  <text x="770" y="325" font-family="'Helvetica Neue', system-ui, sans-serif" font-size="28" font-weight="500" fill="#FAF7F2" text-anchor="middle" opacity="0.7">F</text>

  <!-- 大日期 -->
  <text x="552" y="560" font-family="'Helvetica Neue', 'SF Pro Display', system-ui, sans-serif" font-size="180" font-weight="700" fill="#4A4543" text-anchor="middle">15</text>

  <!-- 小文字 -->
  <text x="552" y="640" font-family="'Helvetica Neue', system-ui, sans-serif" font-size="36" font-weight="400" fill="#8B8580" text-anchor="middle" letter-spacing="8">TODAY</text>

  <!-- 下划线装饰 -->
  <rect x="460" y="670" width="184" height="4" rx="2" fill="#A3B5A0"/>
</svg>
