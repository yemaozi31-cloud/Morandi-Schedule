<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- 背景 - 暖米色调 squircle -->
  <rect width="1024" height="1024" rx="220" fill="#C8C0B0"/>

  <!-- 日历页 -->
  <rect x="192" y="240" width="640" height="544" rx="48" fill="#FAF7F2"/>

  <!-- 日历红色顶栏 -->
  <rect x="192" y="240" width="640" height="140" rx="48" fill="#A3B5A0"/>
  <rect x="192" y="340" width="640" height="40" fill="#A3B5A0"/>

  <!-- "M" 字母标志 -->
  <path d="M380 340 L512 480 L644 340" fill="none" stroke="#FAF7F2" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 日期日网格线 -->
  <line x1="260" y1="500" x2="764" y2="500" stroke="#E8E3DC" stroke-width="6" stroke-linecap="round"/>
  <line x1="260" y1="560" x2="764" y2="560" stroke="#E8E3DC" stroke-width="6" stroke-linecap="round"/>
  <line x1="260" y1="620" x2="640" y2="620" stroke="#E8E3DC" stroke-width="6" stroke-linecap="round"/>

  <!-- 对勾 ✓ -->
  <path d="M430 540 L500 610 L630 480" fill="none" stroke="#A3B5A0" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
