<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- 背景 - 莫兰迪绿 squircle -->
  <rect width="1024" height="1024" rx="220" fill="#A3B5A0"/>

  <!-- 内部浅色面 -->
  <rect x="160" y="160" width="704" height="704" rx="140" fill="#F5F0EB"/>

  <!-- 日历页眉 -->
  <rect x="240" y="240" width="544" height="120" rx="24" fill="#C8C0B0"/>

  <!-- 日历页眉上的圆点装饰（纸夹孔） -->
  <circle cx="512" cy="300" r="12" fill="#A3B5A0" opacity="0.4"/>

  <!-- 日期数字 -->
  <text x="512" y="640" font-family="'Helvetica Neue', 'SF Pro Display', system-ui, sans-serif" font-size="200" font-weight="700" fill="#4A4543" text-anchor="middle" letter-spacing="4">32</text>

  <!-- 日历横线 -->
  <line x1="280" y1="720" x2="744" y2="720" stroke="#E0D9D0" stroke-width="6" stroke-linecap="round"/>
  <line x1="280" y1="770" x2="620" y2="770" stroke="#E0D9D0" stroke-width="6" stroke-linecap="round"/>
</svg>
