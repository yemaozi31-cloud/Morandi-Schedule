<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- 莫兰迪画布底色——暖灰米白 -->
    <linearGradient id="canvasBg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#EBE6DE"/>
      <stop offset="100%" stop-color="#E0D9CE"/>
    </linearGradient>
    <!-- 桌面——莫兰迪画中标志性的灰褐桌面 -->
    <linearGradient id="table" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4CBBE"/>
      <stop offset="100%" stop-color="#C4BAAB"/>
    </linearGradient>
    <!-- 日历卡片——莫兰迪米白 -->
    <linearGradient id="card" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#F8F4EE"/>
      <stop offset="100%" stop-color="#EDE7DE"/>
    </linearGradient>
    <!-- 日历头——莫兰迪粉 -->
    <linearGradient id="header" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#DCC5C0"/>
      <stop offset="100%" stop-color="#D0B8B3"/>
    </linearGradient>
    <!-- 阴影 -->
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="#8B7D70" flood-opacity="0.18"/>
    </filter>
    <filter id="softShadow" x="-5%" y="-5%" width="115%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="16" flood-color="#8B7D70" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- === 背景（画布）=== -->
  <rect width="1024" height="1024" rx="224" fill="url(#canvasBg)"/>

  <!-- === 桌面（底部 35%）=== -->
  <rect x="0" y="666" width="1024" height="358" rx="224" fill="url(#table)"/>
  <!-- 桌面顶部的水平线（桌面与墙的分界） -->
  <rect x="80" y="662" width="864" height="2" fill="#C4BAAB" opacity="0.5"/>

  <!-- === 日历卡片（静物主体）=== -->
  <g filter="url(#shadow)">
    <!-- 卡片主体 -->
    <rect x="222" y="210" width="580" height="500" rx="40" fill="url(#card)"/>
  </g>

  <!-- 日历头部——莫兰迪粉 -->
  <rect x="222" y="210" width="580" height="110" rx="40" fill="url(#header)"/>
  <rect x="222" y="260" width="580" height="60" fill="url(#header)"/>

  <!-- 头部上的"月"文字标识 -->
  <text x="512" y="280" font-family="'SF Pro Display', 'Helvetica Neue', system-ui, sans-serif" font-size="24" font-weight="400" fill="#FAF7F2" text-anchor="middle" letter-spacing="6" opacity="0.8">JULY</text>

  <!-- === 日期数字 32 === -->
  <g filter="url(#softShadow)">
    <text x="512" y="570" font-family="'SF Pro Display', 'Helvetica Neue', system-ui, sans-serif" font-size="190" font-weight="300" fill="#3D3835" text-anchor="middle" letter-spacing="2">
      32
    </text>
  </g>

  <!-- === 日历格子线（极细、克制）=== -->
  <line x1="286" y1="620" x2="738" y2="620" stroke="#DED7CC" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="286" y1="650" x2="738" y2="650" stroke="#DED7CC" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="286" y1="680" x2="590" y2="680" stroke="#DED7CC" stroke-width="2.5" stroke-linecap="round"/>

  <!-- === 静物小细节：卡片底部有一点"影子"与桌面的衔接 === -->
  <rect x="222" y="700" width="580" height="10" rx="4" fill="#C4BAAB" opacity="0.15"/>
</svg>
