name: Build
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - run: npm install

      - name: Build frontend
        run: npx vite build

      - name: Build Tauri app
        run: npx tauri build

      - uses: actions/upload-artifact@v4
        with:
          name: morandi-schedule-${{ matrix.os }}
          path: src-tauri/target/release/bundle/
