name: Build
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    
permissions:                   
  contents: write            
  
jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - run: npm install

      - name: Build frontend
        run: npx vite build

      - name: Build Tauri app
        run: npx tauri build

      - uses: actions/upload-artifact@v4
        with:
          name: morandi-schedule-${{ matrix.os }}
          path: src-tauri/target/release/bundle/

  release:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: morandi-schedule-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.4.0
          name: v0.4.0
          files: |
            **/*.dmg
            **/*.exe
            **/*.msi
          generate_release_notes: true
