name: Build
on:
  push:
    branches: [main]
    tags: [v*]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - run: npm install

      - name: Build frontend
        run: npx vite build

      - name: Build Tauri app
        run: npx tauri build

      - uses: actions/upload-artifact@v4
        with:
          name: morandi-schedule-windows
          path: src-tauri/target/release/bundle/

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: morandi-schedule-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/*.exe
            **/*.msi
          generate_release_notes: true
